<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stackly Air - Airline Booking. The flight you are looking for is missing.">

    <title>404 - Flight Not Found | Stackly Air</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --primary-orange: #f97316;
            --hover-orange: #ea580c;
            --light-orange: #ffedd5;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-white: #ffffff;
            --bg-body: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        .error-bg-glow {
            position: absolute;
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            animation: pulseOrangeGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseOrangeGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.6;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        .scrolling-grid {
            position: absolute;
            top: 20%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(249, 115, 22, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
            transform: rotateX(75deg);
            animation: infiniteGridScroll 15s linear infinite;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 60%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 60%);
        }

        @keyframes infiniteGridScroll {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 600px;
            }
        }

        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px;
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
            transition: transform 0.1s ease-out;
        }

        .status-badge {
            background: var(--light-orange);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: var(--primary-orange);
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .status-badge i {
            animation: radarPing 2s infinite;
        }

        @keyframes radarPing {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: var(--primary-orange);
            position: relative;
            display: inline-block;
            text-shadow: 4px 4px 0px var(--light-orange), 8px 8px 15px rgba(249, 115, 22, 0.2);
            animation: floatingPlane 6s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes floatingPlane {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .error-desc {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            padding: 0 20px;
            font-weight: 500;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 500px;
            margin: 0 auto;
        }

        .btn-base {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 30px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex: 1;
            min-width: 180px;
        }

        .btn-base i {
            transition: transform 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: white;
            border: 2px solid var(--primary-orange);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            background: var(--hover-orange);
            border-color: var(--hover-orange);
            box-shadow: 0 12px 25px rgba(249, 115, 22, 0.3);
        }

        .btn-primary:hover i {
            transform: translateX(-5px);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-orange);
            border: 2px solid var(--primary-orange);
        }

        .btn-outline:hover {
            transform: translateY(-3px);
            background: var(--light-orange);
        }

        .btn-outline:hover i {
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 7rem;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 6px 14px;
                margin-bottom: 20px;
            }

            .error-desc {
                font-size: 1rem;
                margin-bottom: 30px;
            }

            .error-actions {
                flex-direction: column;
                width: 100%;
                align-items: center;
                gap: 15px;
            }

            .btn-base {
                width: 100%;
                max-width: 280px;
                padding: 14px 25px;
            }

            .error-container {
                padding: 30px 15px;
                margin: 0 15px;
            }
        }
    </style>
</head>

<body>

    <div class="error-bg-glow" id="orangeGlow"></div>

    <div class="scrolling-grid"></div>

    <div class="error-container" id="errorContainer">

        <div class="status-badge"><i class="fa-solid fa-satellite-dish"></i> Radar Signal Lost</div>

        <h1 class="error-code">404</h1>

        <p class="error-desc">Oops! The flight you are looking for has already departed, or the page has vanished from
            our radar.</p>

        <div class="error-actions">
            <a href="javascript:history.back()" class="btn-base btn-primary">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
            <a href="index.html" class="btn-base btn-outline">
                <i class="fa-solid fa-house"></i> Return Home
            </a>
        </div>

    </div>

    <script>
        const container = document.getElementById('errorContainer');
        const glow = document.getElementById('orangeGlow');

        document.addEventListener('mousemove', (e) => {
            const halfW = window.innerWidth / 2;
            const halfH = window.innerHeight / 2;

            const xVal = (halfW - e.pageX) / 50;
            const yVal = (halfH - e.pageY) / 50;

            container.style.transform = `rotateY(${xVal * -1}deg) rotateX(${yVal}deg)`;

            glow.style.transform = `translate(${-50 + xVal * 0.5}%, ${-50 + yVal * 0.5}%) scale(1)`;
        });

        document.addEventListener('mouseleave', () => {
            container.style.transform = `rotateY(0deg) rotateX(0deg)`;
            glow.style.transform = `translate(-50%, -50%) scale(1)`;
        });
    </script>

</body>

</html>
